<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Project Tracker{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet"
integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
crossorigin="anonymous"></script>
   <style>
      body {
        background: #f8f9fa;
      }
      .main-card {
        max-width: 500px;
        margin: 2rem auto;
      }
      .form-header {
        color: #343a40;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="/">Project Tracker</a>
        <div class="d-flex gap-2">
          
          {% if user.is_authenticated %} 
          <a class="btn btn-outline-light btn-sm" href="{% url 'logout' %}">
            Logout
          </a>
          {% else %}
          <a class="btn btn-outline-light btn-sm" href="{% url 'signup' %}"
            >Sign up</a
          >
          <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}"
            >Login</a
          >
          {% endif %}
        </div>
      </div>
    </nav>

    <main class="container py-4">{% block content %}{% endblock %}</main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-pj9kE5lj7u8+1KC3Nzx6DJ8F2EyNPEBd9Elh06vCmFIbcB7Tgq4UN8M1Hj+IMCE4"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
